<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ThreadForge — AI Thread Writer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&family=Libre+Baskerville:ital@0;1&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0a; --surface: #111; --surface2: #1a1a1a;
    --border: #2a2a2a; --accent: #e8ff47; --accent2: #ff6b35;
    --text: #f0f0f0; --muted: #666; --card-bg: #141414;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; overflow-x: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 1rem 1.5rem; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(12px); z-index: 100; }
  .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.04em; display: flex; align-items: center; gap: 0.4rem; }
  .logo-dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; }
  .badge { font-family: 'DM Mono', monospace; font-size: 0.65rem; background: var(--surface2); border: 1px solid var(--border); padding: 0.2rem 0.5rem; border-radius: 20px; color: var(--muted); }
  main { max-width: 700px; margin: 0 auto; padding: 2.5rem 1rem 5rem; }
  .hero { text-align: center; margin-bottom: 2.5rem; }
  .hero-label { font-family: 'DM Mono', monospace; font-size: 0.65rem; letter-spacing: 0.18em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.6rem; }
  h1 { font-size: clamp(1.8rem, 6vw, 2.8rem); font-weight: 800; letter-spacing: -0.04em; line-height: 1.1; margin-bottom: 0.6rem; }
  h1 em { font-family: 'Libre Baskerville', serif; font-style: italic; font-weight: 400; color: var(--accent); }
  .hero p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
  .input-zone { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.5rem; }
  label { display: block; font-size: 0.68rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.6rem; }
  textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 0.95rem; padding: 0.9rem 1rem; resize: vertical; min-height: 100px; outline: none; line-height: 1.6; transition: border-color 0.2s; }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }
  .controls { display: flex; gap: 0.8rem; margin-top: 1rem; flex-wrap: wrap; align-items: flex-end; }
  .sel-wrap { display: flex; flex-direction: column; gap: 0.3rem; flex: 1; min-width: 130px; }
  select { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.8rem; padding: 0.55rem 0.8rem; outline: none; cursor: pointer; }
  .gen-btn { background: var(--accent); color: #0a0a0a; border: none; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700; padding: 0.65rem 1.5rem; cursor: pointer; letter-spacing: -0.02em; display: flex; align-items: center; gap: 0.4rem; transition: transform 0.15s, opacity 0.15s; white-space: nowrap; }
  .gen-btn:hover { transform: translateY(-2px); }
  .gen-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .spinner { width: 15px; height: 15px; border: 2px solid rgba(0,0,0,0.2); border-top-color: #0a0a0a; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
  .loading .spinner { display: block; }
  .error-box { background: #1a0808; border: 1px solid #5a1010; border-radius: 10px; color: #ff6b6b; font-family: 'DM Mono', monospace; font-size: 0.8rem; padding: 0.7rem 1rem; margin-bottom: 1rem; }
  #output { display: none; }
  .out-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; flex-wrap: wrap; gap: 0.5rem; }
  .out-title { font-size: 1rem; font-weight: 700; }
  .out-actions { display: flex; gap: 0.5rem; }
  .action-btn { background: var(--surface); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 0.62rem; padding: 0.4rem 0.8rem; border-radius: 6px; cursor: pointer; letter-spacing: 0.06em; text-transform: uppercase; transition: border-color 0.15s, color 0.15s; }
  .action-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tweet-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.2rem 1.4rem; margin-bottom: 0.7rem; }
  .card-meta { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.7rem; }
  .tweet-num { font-family: 'DM Mono', monospace; font-size: 0.6rem; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 0.15rem 0.45rem; border-radius: 20px; }
  .tweet-type { font-family: 'DM Mono', monospace; font-size: 0.58rem; color: var(--accent2); letter-spacing: 0.1em; text-transform: uppercase; }
  .tweet-body { font-size: 0.95rem; line-height: 1.65; color: #e8e8e8; }
  .tweet-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 0.8rem; }
  .char-count { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: #444; }
  .copy-btn { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); background: none; border: none; cursor: pointer; letter-spacing: 0.08em; text-transform: uppercase; padding: 0; transition: color 0.15s; }
  .copy-btn:hover { color: var(--accent); }
  .graphic-card { border-radius: 12px; overflow: hidden; margin-bottom: 0.7rem; border: 1px solid var(--border); }
  .graphic-inner { padding: 1.8rem 2rem; display: flex; align-items: center; justify-content: center; position: relative; min-height: 110px; }
  .graphic-text { font-size: clamp(0.9rem, 2.5vw, 1.2rem); font-weight: 800; letter-spacing: -0.03em; text-align: center; line-height: 1.3; }
  .graphic-num { position: absolute; top: 10px; right: 12px; font-family: 'DM Mono', monospace; font-size: 0.58rem; color: rgba(255,255,255,0.2); }
  .graphic-bar { height: 3px; background: var(--accent); }
  .graphic-footer { display: flex; align-items: center; justify-content: space-between; padding: 0.6rem 1.2rem; background: var(--surface); border-top: 1px solid var(--border); }
  .divider { display: flex; align-items: center; gap: 0.6rem; margin: 0 0.3rem 0.7rem; }
  .div-line { flex: 1; height: 1px; background: var(--border); }
  .div-dot { width: 5px; height: 5px; background: var(--border); border-radius: 50%; }
  .stats { display: flex; gap: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 1rem 1.4rem; margin-top: 1rem; flex-wrap: wrap; }
  .stat-val { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.04em; color: var(--accent); }
  .stat-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  .fade-up { animation: fadeUp 0.4s ease both; }
  ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>
<header>
  <div class="logo"><span class="logo-dot"></span> ThreadForge</div>
  <span class="badge">AI Thread Writer</span>
</header>
<main>
  <div class="hero">
    <p class="hero-label">No hype. No fluff. Just clarity.</p>
    <h1>Write threads that <em>actually hit.</em></h1>
    <p>Drop your topic. Get a clean, well-structured X thread — with graphics — ready to post.</p>
  </div>

  <div class="input-zone">
    <label>What's your thread about?</label>
    <textarea id="promptInput" placeholder="e.g. Why most people misunderstand compound interest..." rows="4"></textarea>
    <div class="controls">
      <div class="sel-wrap">
        <label>Thread length</label>
        <select id="lengthSelect">
          <option value="5">5 tweets — Quick take</option>
          <option value="8" selected>8 tweets — Standard</option>
          <option value="12">12 tweets — Deep dive</option>
        </select>
      </div>
      <div class="sel-wrap">
        <label>Tone</label>
        <select id="toneSelect">
          <option value="authoritative">Authoritative</option>
          <option value="conversational" selected>Conversational</option>
          <option value="analytical">Analytical</option>
          <option value="storytelling">Storytelling</option>
        </select>
      </div>
      <button class="gen-btn" id="genBtn" onclick="generate()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Generate Thread →</span>
      </button>
    </div>
  </div>

  <div id="errorBox" class="error-box" style="display:none"></div>

  <div id="output">
    <div class="out-header">
      <span class="out-title">Your Thread</span>
      <div class="out-actions">
        <button class="action-btn" onclick="copyAll()">Copy All</button>
        <button class="action-btn" onclick="generate()">Regenerate</button>
      </div>
    </div>
    <div id="threadList"></div>
    <div id="threadStats" class="stats"></div>
  </div>
</main>

<script>
const COLORS = [
  { from: "#1a1a2e", to: "#0f3460", text: "#60a5fa" },
  { from: "#1a0800", to: "#2d1500", text: "#ff6b35" },
  { from: "#0a1a0a", to: "#051405", text: "#4ade80" },
  { from: "#1a001a", to: "#2d002d", text: "#e879f9" },
  { from: "#1a1500", to: "#2d2400", text: "#e8ff47" },
];

let currentThread = null;

async function generate() {
  const prompt = document.getElementById("promptInput").value.trim();
  const length = document.getElementById("lengthSelect").value;
  const tone = document.getElementById("toneSelect").value;

  if (!prompt) { showError("Please enter a topic first."); return; }

  hideError();
  setLoading(true);
  document.getElementById("output").style.display = "none";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt, length, tone }),
    });

    const data = await res.json();

    if (!res.ok || data.error) { showError(data.error || "Something went wrong."); return; }
    if (!data.tweets || !Array.isArray(data.tweets)) { showError("Couldn't parse thread. Try again."); return; }

    currentThread = data;
    renderThread(data);
  } catch (err) {
    showError("Network error. Check your connection and try again.");
  } finally {
    setLoading(false);
  }
}

function renderThread(data) {
  const list = document.getElementById("threadList");
  list.innerHTML = "";

  data.tweets.forEach((tweet, i) => {
    if (i > 0) {
      const div = document.createElement("div");
      div.className = "divider";
      div.innerHTML = '<div class="div-line"></div><div class="div-dot"></div><div class="div-line"></div>';
      list.appendChild(div);
    }

    const color = COLORS[i % COLORS.length];
    const el = document.createElement("div");
    el.className = "fade-up";
    el.style.animationDelay = `${i * 0.05}s`;

    if (tweet.isGraphic) {
      const preview = tweet.text.split(" ").slice(0, 9).join(" ");
      el.innerHTML = `
        <div class="graphic-card">
          <div class="graphic-inner" style="background: linear-gradient(135deg, ${color.from}, ${color.to})">
            <div class="graphic-num">${String(tweet.id).padStart(2,"0")} / ${String(data.tweets.length).padStart(2,"0")}</div>
            <div class="graphic-text" style="color:${color.text}">"${preview}${tweet.text.split(" ").length > 9 ? "…" : ""}"</div>
          </div>
          <div class="graphic-bar"></div>
          <div class="graphic-footer">
            <div style="display:flex;align-items:center;gap:0.5rem">
              <span class="tweet-num">${tweet.id}/${data.tweets.length}</span>
              <span class="tweet-type">✦ Graphic</span>
            </div>
            <button class="copy-btn" onclick="copyTweet(${tweet.id}, \`${escape(tweet.text)}\`, this)">Copy text</button>
          </div>
        </div>`;
    } else {
      el.innerHTML = `
        <div class="tweet-card">
          <div class="card-meta">
            <span class="tweet-num">${tweet.id}/${data.tweets.length}</span>
            ${tweet.id === 1 ? '<span class="tweet-type">Hook</span>' : ""}
            ${tweet.id === data.tweets.length ? '<span class="tweet-type">CTA</span>' : ""}
          </div>
          <div class="tweet-body">${tweet.text}</div>
          <div class="tweet-footer">
            <span class="char-count">${tweet.text.length} chars</span>
            <button class="copy-btn" onclick="copyTweet(${tweet.id}, \`${escape(tweet.text)}\`, this)">Copy</button>
          </div>
        </div>`;
    }

    list.appendChild(el);
  });

  const avgChars = Math.round(data.tweets.reduce((a, t) => a + t.text.length, 0) / data.tweets.length);
  document.getElementById("threadStats").innerHTML = `
    <div><div class="stat-val">${data.tweets.length}</div><div class="stat-label">Tweets</div></div>
    <div><div class="stat-val">${data.tweets.filter(t => t.isGraphic).length}</div><div class="stat-label">Graphics</div></div>
    <div><div class="stat-val">${avgChars}</div><div class="stat-label">Avg chars</div></div>
    <div><div class="stat-val">${Math.ceil(data.tweets.length * 0.4)}m</div><div class="stat-label">Read time</div></div>`;

  const out = document.getElementById("output");
  out.style.display = "block";
  setTimeout(() => out.scrollIntoView({ behavior: "smooth" }), 100);
}

function escape(text) { return text.replace(/`/g, "'").replace(/\\/g, "\\\\"); }

function copyTweet(id, text, btn) {
  navigator.clipboard.writeText(unescape(text)).then(() => {
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = btn.textContent.includes("text") ? "Copy text" : "Copy", 1500);
  });
}

function copyAll() {
  if (!currentThread) return;
  const all = currentThread.tweets.map((t, i) => `${i + 1}/ ${t.text}`).join("\n\n");
  navigator.clipboard.writeText(all).then(() => {
    const btn = event.target;
    btn.textContent = "Copied!";
    setTimeout(() => btn.textContent = "Copy All", 2000);
  });
}

function setLoading(val) {
  const btn = document.getElementById("genBtn");
  const spinner = document.getElementById("spinner");
  const txt = document.getElementById("btnText");
  btn.disabled = val;
  spinner.style.display = val ? "block" : "none";
  txt.textContent = val ? "Writing..." : "Generate Thread →";
}

function showError(msg) {
  const box = document.getElementById("errorBox");
  box.textContent = "⚠ " + msg;
  box.style.display = "block";
}

function hideError() {
  document.getElementById("errorBox").style.display = "none";
}

document.getElementById("promptInput").addEventListener("keydown", e => {
  if (e.key === "Enter" && e.metaKey) generate();
});
</script>
</body>
</html>
